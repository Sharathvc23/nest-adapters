# SPDX-License-Identifier: Apache-2.0
name: registry_discovery
description: "Agents register an AgentCard and discover peers through the registry layer. With registry=sm_bridge_facts, discovery is over canonical NANDA AgentFacts (each agent projected to an SmAgentFacts whose id is its did:key); swap registry=in_memory for the stock behaviour with identical agent logic."

tier: 1
seed: 42

agents:
  count: 8
  brain: state-machine

layers:
  transport: in_memory
  comms: nest_native
  identity: ed25519_didkey
  registry: sm_bridge_facts
  auth: jwt
  trust: score_average
  payments: prepaid_credits
  coordination: contract_net
  negotiation: alternating_offers
  memory: blackboard
  privacy: noop
  datafacts: datafacts_v1

task:
  type: registry_discovery
  config:
    discover_at_tick: 5

failures:
  message_drop: 0.0

duration: "ticks: 100"

metrics:
  - message_count

output:
  trace: ./traces/registry_discovery.jsonl
