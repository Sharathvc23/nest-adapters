# SPDX-License-Identifier: Apache-2.0
name: auth_handshake
description: "Each agent issues a token signed by its own Ed25519 did:key (auth=did_key) and presents it to a peer, who verifies the signature against the subject's did:key — no shared secret — and replies with a grant. Swap auth=jwt for the stock HMAC behaviour with identical agent logic."

tier: 1
seed: 42

agents:
  count: 8
  brain: state-machine

layers:
  transport: in_memory
  comms: nest_native
  identity: ed25519_didkey
  registry: in_memory
  auth: did_key
  trust: score_average
  payments: prepaid_credits
  coordination: contract_net
  negotiation: alternating_offers
  memory: blackboard
  privacy: noop
  datafacts: datafacts_v1

task:
  type: auth_handshake
  config: {}

failures:
  message_drop: 0.0

duration: "ticks: 100"

metrics:
  - message_count

output:
  trace: ./traces/auth_handshake.jsonl
