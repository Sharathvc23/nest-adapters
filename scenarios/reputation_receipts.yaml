# SPDX-License-Identifier: Apache-2.0
name: reputation_receipts
description: "16 honest agents plus a 4-agent isolated collusion ring, all emitting identical-shaped positive trust evidence carrying cross-signed ARP receipts. Proves agent_receipts severs the wash-trading ring (4/4 caught) where score_average's running mean does not (0/4)."

tier: 1
seed: 42

agents:
  count: 20
  brain: state-machine

layers:
  transport: in_memory
  comms: nest_native
  identity: ed25519_didkey
  registry: in_memory
  auth: jwt
  trust: agent_receipts
  payments: prepaid_credits
  coordination: contract_net
  negotiation: alternating_offers
  memory: blackboard
  privacy: noop
  datafacts: datafacts_v1

task:
  type: reputation_receipts
  config: {}

failures:
  message_drop: 0.0

duration: "ticks: 10000"

metrics:
  - message_count

output:
  trace: ./traces/reputation_receipts.jsonl
