# SPDX-License-Identifier: Apache-2.0
name: identity_rotation
description: "Each agent rotates its Ed25519 key mid-run and signs before and after; verification is as-of the signing-key's validity window."

tier: 1
seed: 42

agents:
  count: 4
  brain: state-machine

layers:
  transport: in_memory
  comms: nest_native
  identity: sm_ed25519_rotating
  registry: in_memory
  auth: jwt
  trust: score_average
  payments: prepaid_credits
  coordination: contract_net
  negotiation: alternating_offers
  memory: blackboard
  privacy: noop
  datafacts: datafacts_v1

task:
  type: identity_rotation
  config:
    rotate_at_tick: 10

failures:
  message_drop: 0.0

duration: "ticks: 10000"

metrics:
  - message_count

output:
  trace: ./traces/identity_rotation.jsonl
