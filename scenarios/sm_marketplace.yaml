# SPDX-License-Identifier: Apache-2.0
name: sm_marketplace
description: "A data marketplace exercising all four nest-adapters layers end to end: sellers register (sm_bridge_facts) and publish datasets with signed provenance (arp_receipts); buyers discover them, integrity-fetch the data, and credit the seller with a cross-signed ARP purchase receipt (agent_receipts) over ed25519_didkey identity. Swap any layer for its stock plugin and the agent logic is unchanged."

tier: 1
seed: 42

agents:
  count: 8
  brain: state-machine

layers:
  transport: in_memory
  comms: nest_native
  identity: ed25519_didkey
  registry: sm_bridge_facts
  auth: jwt
  trust: agent_receipts
  payments: prepaid_credits
  coordination: contract_net
  negotiation: alternating_offers
  memory: blackboard
  privacy: noop
  datafacts: arp_receipts

task:
  type: sm_marketplace
  config:
    transact_at_tick: 5

failures:
  message_drop: 0.0

duration: "ticks: 100"

metrics:
  - message_count

output:
  trace: ./traces/sm_marketplace.jsonl
